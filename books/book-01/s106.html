<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>天窗365-四月十五日</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="index.html">← 返回本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>四月十五日</h1><p class="meta">天窗365 · 第106/366段</p><p><a class="btn" href="s105.html">上一篇</a><a class="btn" href="s107.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src='https://audio.tanhuajilu.dpdns.org/book-01/s106.mp3'></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度:<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></div><article class="article"><h2>四月十五日</h2>
<p>原来，灵魂体，我们不会搞得清楚。神的伟大，我们更搞不清楚了。但神是实在存在的。</p>
<p>保罗在大马色的路上看见大光，他第一句的话就是:&quot;<strong>主啊，你是谁</strong>？&quot;（徒9:5）</p>
<p><strong>耶稣是谁？今天的基督徒要有更新的认识方可</strong>！不然，信耶稣，听一大堆十字架的道理，也不过到此为止，再下去，再没有下文了。</p>
<p>如果我们对主有认识，主耶稣就给你讲不完。你对十字架的工作有认识&quot;十字架的工作&quot;也给你讲不完。所以保罗才说:我在你们中间，不知道别的，只知道耶稣基督并祂钉十字架。（林前2:2）</p></article></main><script>(function(){
  const audio = document.getElementById('daily-audio');
  const toggle = document.getElementById('auto-next-play');
  const nextLink = Array.from(document.querySelectorAll('.hero a.btn')).find(a => a.textContent.includes('下一篇'));
  if (!audio || !toggle) return;

  const KEY = 'book01-auto-next-play';
  const RATE_KEY = 'book01-playback-rate';
  const rateSel = document.getElementById('playback-rate');

  const saved = localStorage.getItem(KEY);
  toggle.checked = saved === null ? true : saved === '1';
  toggle.addEventListener('change', () => localStorage.setItem(KEY, toggle.checked ? '1' : '0'));

  const savedRate = localStorage.getItem(RATE_KEY) || '1';
  if (rateSel) {
    if (Array.from(rateSel.options).some(o => o.value === savedRate)) rateSel.value = savedRate;
    audio.playbackRate = parseFloat(rateSel.value || '1');
    rateSel.addEventListener('change', () => {
      audio.playbackRate = parseFloat(rateSel.value || '1');
      localStorage.setItem(RATE_KEY, rateSel.value || '1');
    });
  }

  const params = new URLSearchParams(location.search);
  if (params.get('autoplay') === '1') {
    audio.play().catch(() => {});
  }

  audio.addEventListener('ended', () => {
    if (!toggle.checked || !nextLink) return;
    const u = new URL(nextLink.href, location.href);
    u.searchParams.set('autoplay', '1');
    location.href = u.toString();
  });
})();</script></body></html>
