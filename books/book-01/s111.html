<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>01.天窗365-四月二十日</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="index.html">← 返回本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>四月二十日</h1><p class="meta">01.天窗365 · 第111/366段</p><p><a class="btn" href="s110.html">上一篇</a><a class="btn" href="s112.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src="https://audio.tanhuajilu.dpdns.org/book-01/s111.mp3"></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度：<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></div><article class="article"><h2>四月二十日</h2>
<p>你有一个脾气，怎么解决？你相信说，在基督里，这脾气就解决了。因为基督十字架的工作，在十字架上已经做成了。借着我的信，我的脾气在基督里解决了。所以，是先相信，先站住地位。</p>
<p>再下去，还有吗？还有！**我们乃是借着圣灵来治死我们的肉体**（罗8:13）。十字架的工作，在客观上已经完成了；圣灵的工作就把神这个工作完成在我们身上。</p>
<p>所以，我们不是靠自己努力挣扎，乃是靠圣灵在我们里面的大能运行。另一方面，圣灵还借着环境管教我们，你脱离圣灵的管教，就没有办法。</p></article></main><script>(function(){
  const audio = document.getElementById('daily-audio');
  const toggle = document.getElementById('auto-next-play');
  const nextLink = Array.from(document.querySelectorAll('.hero a.btn')).find(a => a.textContent.includes('下一篇'));
  if (!audio || !toggle) return;

  const KEY = 'book01-auto-next-play';
  const RATE_KEY = 'book01-playback-rate';
  const rateSel = document.getElementById('playback-rate');

  const saved = localStorage.getItem(KEY);
  toggle.checked = saved === null ? true : saved === '1';
  toggle.addEventListener('change', () => localStorage.setItem(KEY, toggle.checked ? '1' : '0'));

  const savedRate = localStorage.getItem(RATE_KEY) || '1';
  if (rateSel) {
    if (Array.from(rateSel.options).some(o => o.value === savedRate)) rateSel.value = savedRate;
    audio.playbackRate = parseFloat(rateSel.value || '1');
    rateSel.addEventListener('change', () => {
      audio.playbackRate = parseFloat(rateSel.value || '1');
      localStorage.setItem(RATE_KEY, rateSel.value || '1');
    });
  }

  const params = new URLSearchParams(location.search);
  if (params.get('autoplay') === '1') {
    audio.play().catch(() => {});
  }

  audio.addEventListener('ended', () => {
    if (!toggle.checked || !nextLink) return;
    const u = new URL(nextLink.href, location.href);
    u.searchParams.set('autoplay', '1');
    location.href = u.toString();
  });
})();</script></body></html>
