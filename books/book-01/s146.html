<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>01.天窗365-五月二十五日</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="index.html">← 返回本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>五月二十五日</h1><p class="meta">01.天窗365 · 第146/366段</p><p><a class="btn" href="s145.html">上一篇</a><a class="btn" href="s147.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src="https://audio.tanhuajilu.dpdns.org/book-01/s146.mp3"></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度：<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></div><article class="article"><h2>五月二十五日</h2>
<p>**趁你年轻，看圣经一年最少看一遍**。要坚持念一遍也不简单，天天念。如果三天没有念，就补念。三天补十五章。如果再多几天，就越多越困难了。天天把它完成。每年读一遍，念十年就十遍。以前我们念圣经三个月念一遍。念过就有印象，有人还会背。</p>
<p>你能看书时，尽量看，有时间就去看。一本一本的书都去看，看了总有一个印象。或许当下忘记了，等到用的时候就会记得。</p>
<p>总要抓紧时间，多看圣经，多看属灵的书。</p></article></main><script>(function(){
  const audio = document.getElementById('daily-audio');
  const toggle = document.getElementById('auto-next-play');
  const nextLink = Array.from(document.querySelectorAll('.hero a.btn')).find(a => a.textContent.includes('下一篇'));
  if (!audio || !toggle) return;

  const KEY = 'book01-auto-next-play';
  const RATE_KEY = 'book01-playback-rate';
  const rateSel = document.getElementById('playback-rate');

  const saved = localStorage.getItem(KEY);
  toggle.checked = saved === null ? true : saved === '1';
  toggle.addEventListener('change', () => localStorage.setItem(KEY, toggle.checked ? '1' : '0'));

  const savedRate = localStorage.getItem(RATE_KEY) || '1';
  if (rateSel) {
    if (Array.from(rateSel.options).some(o => o.value === savedRate)) rateSel.value = savedRate;
    audio.playbackRate = parseFloat(rateSel.value || '1');
    rateSel.addEventListener('change', () => {
      audio.playbackRate = parseFloat(rateSel.value || '1');
      localStorage.setItem(RATE_KEY, rateSel.value || '1');
    });
  }

  const params = new URLSearchParams(location.search);
  if (params.get('autoplay') === '1') {
    audio.play().catch(() => {});
  }

  audio.addEventListener('ended', () => {
    if (!toggle.checked || !nextLink) return;
    const u = new URL(nextLink.href, location.href);
    u.searchParams.set('autoplay', '1');
    location.href = u.toString();
  });
})();</script></body></html>
