<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>92年选二 · 第三十五段</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="g001.html">← 返回本组目录</a> · <a href="index.html">本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>92年选二 · 第三十五段</h1><p class="nav-row"><a class="btn" href="s034.html">上一篇</a> <a class="btn" href="s036.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src="https://audio.tanhuajilu.dpdns.org/book-06/s035.mp3"></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度:<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></div><article class="article"><p>问:信和信心有什么区别？</p><p>答:相信主耶稣就得救，大家都一样。而信心在每个人里面，却有大小不同之分。多有认识，信心就大，少认识就小。每个人的信心不一样，因每个人信的认识程度不同，我们认识什么，就相信什么。我们认识主，是关乎信心。就要我们认识主！对生活，有人有信心，不会挂虑，有人却很有挂虑，天天都苦。所以，每个人信心不同。</p><p>工作也要有信心，我们负责作工，效果就由主负责。</p><p>信心也是倚靠神，我们里面倚靠神。</p></article></main><script>(function(){const audio=document.getElementById('daily-audio');const toggle=document.getElementById('auto-next-play');const nextLink=Array.from(document.querySelectorAll('a')).find(a=>a.textContent.includes('下一篇'));if(!audio||!toggle)return;const KEY='book06-auto-next-play';const RATE_KEY='book06-playback-rate';const rateSel=document.getElementById('playback-rate');const saved=localStorage.getItem(KEY);toggle.checked=(saved===null?true:saved==='1');toggle.addEventListener('change',()=>localStorage.setItem(KEY,toggle.checked?'1':'0'));const savedRate=localStorage.getItem(RATE_KEY)||'1';if(rateSel){if(Array.from(rateSel.options).some(o=>o.value===savedRate))rateSel.value=savedRate;audio.playbackRate=parseFloat(rateSel.value||'1');rateSel.addEventListener('change',()=>{audio.playbackRate=parseFloat(rateSel.value||'1');localStorage.setItem(RATE_KEY,rateSel.value||'1');});}const params=new URLSearchParams(location.search);if(params.get('autoplay')==='1')audio.play().catch(()=>{});audio.addEventListener('ended',()=>{if(!toggle.checked||!nextLink)return;const u=new URL(nextLink.href,location.href);u.searchParams.set('autoplay','1');location.href=u.toString();});})();</script></body></html>
