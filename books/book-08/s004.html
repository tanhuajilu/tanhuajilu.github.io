<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>《谈话记录八》，(366天交通记录选文) · 第四段</title><link rel='stylesheet' href='/style.css'></head><body><div class='container'><header><a href='index.html'>← 返回</a><h1>《谈话记录八》，(366天交通记录选文) · 第四段</h1></header><div class="audio-panel"><audio id="daily-audio" controls preload="none" src="/audio/book-08/s004.mp3"></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度:<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div><article class='content'># 天国又好像买卖人，寻找好珠子。遇见一颗重价的珠子，就去变卖他一切所有的，买了这颗珠子。(太13:45,46)<br><br># 我约翰就是你们的弟兄，和你们在<strong>耶稣</strong>（javascript:googleform（%22耶稣%22））的患难，国度，忍耐里一同有分。为神的道，并为给<strong>耶稣</strong>（javascript:googleform（%22耶稣%22））作的见证，曾在那名叫拔摩的海岛上。（<strong><strong>启</strong></strong>1:9)</article><footer class='nav-links'><a href='s003.html'>← 上一篇</a> <a href='s005.html'>下一篇 →</a></footer></div><script>(function(){
  const audio=document.getElementById('daily-audio');
  const toggle=document.getElementById('auto-next-play');
  const nextLink=Array.from(document.querySelectorAll('a')).find(a=>a.textContent.includes('下一篇'));
  if(!audio||!toggle) return;
  const KEY='book-08-auto-next-play';
  const RATE_KEY='book-08-playback-rate';
  const rateSel=document.getElementById('playback-rate');
  const saved=localStorage.getItem(KEY); toggle.checked=(saved===null?true:saved==='1');
  toggle.addEventListener('change',()=>localStorage.setItem(KEY,toggle.checked?'1':'0'));
  const savedRate=localStorage.getItem(RATE_KEY)||'1';
  if(rateSel){ if(Array.from(rateSel.options).some(o=>o.value===savedRate)) rateSel.value=savedRate; audio.playbackRate=parseFloat(rateSel.value||'1');
    rateSel.addEventListener('change',()=>{audio.playbackRate=parseFloat(rateSel.value||'1');localStorage.setItem(RATE_KEY,rateSel.value||'1')}); }
  const params=new URLSearchParams(location.search); if(params.get('autoplay')==='1') audio.play().catch(()=>{});
  audio.addEventListener('ended',()=>{ if(!toggle.checked||!nextLink) return; const u=new URL(nextLink.href,location.href); u.searchParams.set('autoplay','1'); location.href=u.toString(); });
})();</script></body></html>
