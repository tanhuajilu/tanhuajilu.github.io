w URLSearchParams(location.search);if(p.get('autoplay')==='1')a.play().catch(()=>{});a.addEventListener('ended',()=>{if(!t.checked||!n)return;const u=new URL(n.href,location.href);u.searchParams.set('autoplay','1');location.href=u.toString();});})();</script></body></html>
