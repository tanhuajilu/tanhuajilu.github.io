<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>04.晒熟的美果-三月十六日</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="index.html">← 返回本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>三月十六日</h1><p class="meta">04.晒熟的美果 · 第70/366段</p><p><a class="btn" href="s069.html">上一篇</a><a class="btn" href="s071.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src="https://audio.tanhuajilu.dpdns.org/book-04/s070.mp3"></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻到下一页并自动播放</label><span class="speed-control">播放速度：<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></div><article class="article"><h2>三月十六日</h2>
<p>人犯了罪，因着良心软弱，加上撒但做控告的工作，就垮下去，我们要帮助他，叫他认识主宝血的功效。宝血能抵住撒但的控告，同时宝血也抵住了良心的控告。</p>
<p>就如马丁路得有一次遭撒但控告，撒但指着本子上所写犯罪的记录说他有罪。马丁路得拿着笔，蘸了红墨水把所写的记录一条一条画掉：&quot;主的宝血有功效，已消除我一切所犯的罪。&quot;所以要叫人知道宝血的功效。</p>
<p>很多信徒说：&quot;我要完全，要做好。&quot;事实不是作好就完全，乃是神叫你相信基督作我们的义。</p>
</article></main><script>(function(){
  const audio = document.getElementById('daily-audio');
  const toggle = document.getElementById('auto-next-play');
  const nextLink = Array.from(document.querySelectorAll('.hero a.btn')).find(a => a.textContent.includes('下一篇'));
  if (!audio || !toggle) return;

  const KEY = 'book01-auto-next-play';
  const RATE_KEY = 'book01-playback-rate';
  const rateSel = document.getElementById('playback-rate');

  const saved = localStorage.getItem(KEY);
  toggle.checked = saved === null ? true : saved === '1';
  toggle.addEventListener('change', () => localStorage.setItem(KEY, toggle.checked ? '1' : '0'));

  const savedRate = localStorage.getItem(RATE_KEY) || '1';
  if (rateSel) {
    if (Array.from(rateSel.options).some(o => o.value === savedRate)) rateSel.value = savedRate;
    audio.playbackRate = parseFloat(rateSel.value || '1');
    rateSel.addEventListener('change', () => {
      audio.playbackRate = parseFloat(rateSel.value || '1');
      localStorage.setItem(RATE_KEY, rateSel.value || '1');
    });
  }

  const params = new URLSearchParams(location.search);
  if (params.get('autoplay') === '1') {
    audio.play().catch(() => {});
  }

  audio.addEventListener('ended', () => {
    if (!toggle.checked || !nextLink) return;
    const u = new URL(nextLink.href, location.href);
    u.searchParams.set('autoplay', '1');
    location.href = u.toString();
  });
})();</script></body></html>
