<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>04.晒熟的美果-二月六日</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="index.html">← 返回本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>二月六日</h1><p class="meta">04.晒熟的美果 · 第33/366段</p><p><a class="btn" href="s032.html">上一篇</a><a class="btn" href="s034.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src="https://audio.tanhuajilu.dpdns.org/book-04/s033.mp3"></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度：<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></div><article class="article"><h2>二月六日</h2>
<p>对你们年青的弟兄，我说，你们很有福气，像我们在你们的年龄时，自己是没有办法听到这样的道理，都是自己在经历中去碰，我们不懂得的，去问年长弟兄，他们也不懂得。只是从自己一点的经历中去学习，也参考一点属灵的书得到印证，是这样子才得到一点清楚的东西，以后就越走越清楚。</p>
<p>对每个人，对于所交通的，他进步，自己也进步。他们通了，我们也通了。当大家在一起，因有对流，大家都通。通了，碰到主了，那些外面的东西就放下来了。</p>
<p>为着一个道理彼此在争，是太没有意思的。</p>
</article></main><script>(function(){
  const audio = document.getElementById('daily-audio');
  const toggle = document.getElementById('auto-next-play');
  const nextLink = Array.from(document.querySelectorAll('.hero a.btn')).find(a => a.textContent.includes('下一篇'));
  if (!audio || !toggle) return;

  const KEY = 'book01-auto-next-play';
  const RATE_KEY = 'book01-playback-rate';
  const rateSel = document.getElementById('playback-rate');

  const saved = localStorage.getItem(KEY);
  toggle.checked = saved === null ? true : saved === '1';
  toggle.addEventListener('change', () => localStorage.setItem(KEY, toggle.checked ? '1' : '0'));

  const savedRate = localStorage.getItem(RATE_KEY) || '1';
  if (rateSel) {
    if (Array.from(rateSel.options).some(o => o.value === savedRate)) rateSel.value = savedRate;
    audio.playbackRate = parseFloat(rateSel.value || '1');
    rateSel.addEventListener('change', () => {
      audio.playbackRate = parseFloat(rateSel.value || '1');
      localStorage.setItem(RATE_KEY, rateSel.value || '1');
    });
  }

  const params = new URLSearchParams(location.search);
  if (params.get('autoplay') === '1') {
    audio.play().catch(() => {});
  }

  audio.addEventListener('ended', () => {
    if (!toggle.checked || !nextLink) return;
    const u = new URL(nextLink.href, location.href);
    u.searchParams.set('autoplay', '1');
    location.href = u.toString();
  });
})();</script></body></html>
