<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>基督長成的身量-一月二十六日</title><link rel='stylesheet' href='../../style.css'></head><body><main class='site'><a href='index.html'>← 返回本书目录</a> · <a href='../../index.html'>书库首页</a><div class='hero'><h1>一月二十六日</h1><p class='meta'>基督長成的身量 · 第26/366段</p><p><a class='btn' href='s025.html'>上一篇</a><a class='btn' href='s027.html'>下一篇</a></p><div class='audio-panel'><audio id='daily-audio' controls preload='none' src='https://audio.tanhuajilu.dpdns.org/book-13/s026.mp3'></audio><p class='meta audio-controls-inline'><label><input type='checkbox' id='auto-next-play'> 自动翻页并播放&nbsp;&nbsp;</label><span class='speed-control'>播放速度:<select id='playback-rate'><option value='0.8'>0.8x</option><option value='0.9'>0.9x</option><option value='1' selected>1.0x</option><option value='1.1'>1.1x</option><option value='1.25'>1.25x</option><option value='1.5'>1.5x</option></select></span></p></div></div><article class='article'><p>到了伯大尼，主对马大、马利亚说:"你若信，就必看见神的荣耀。"(约11:40)意思是:这个复活，你信不信！如果信就看见神的荣耀。拉撒路的复活就是荣耀神。</p><p>在别的经文里，主耶稣向父神说:"愿你荣耀你的儿子，使儿子也荣耀你。"所以主在这里的工作就是要显出神的荣耀。</p><p>在这里，人是绝望的，但是在绝望中还有盼望。我们的许多难处，叫我们焦急的去抓住神来作，虽然如此，还要照神的时间，不是照我们的时间。神的时间一到，自然而然要显出神的工作来。</p></article></main><script>(function(){const audio=document.getElementById('daily-audio');const toggle=document.getElementById('auto-next-play');const nextLink=Array.from(document.querySelectorAll('.hero a.btn')).find(a=>a.textContent.includes('下一篇'));if(!audio||!toggle)return;const KEY='book01-auto-next-play';const RATE_KEY='book01-playback-rate';const rateSel=document.getElementById('playback-rate');const saved=localStorage.getItem(KEY);toggle.checked=saved===null?true:saved==='1';toggle.addEventListener('change',()=>localStorage.setItem(KEY,toggle.checked?'1':'0'));const savedRate=localStorage.getItem(RATE_KEY)||'1';if(rateSel){if(Array.from(rateSel.options).some(o=>o.value===savedRate))rateSel.value=savedRate;audio.playbackRate=parseFloat(rateSel.value||'1');rateSel.addEventListener('change',()=>{audio.playbackRate=parseFloat(rateSel.value||'1');localStorage.setItem(RATE_KEY,rateSel.value||'1')});}const params=new URLSearchParams(location.search);if(params.get('autoplay')==='1'){audio.play().catch(()=>{});}audio.addEventListener('ended',()=>{if(!toggle.checked||!nextLink)return;const u=new URL(nextLink.href,location.href);u.searchParams.set('autoplay','1');location.href=u.toString();});})();</script></body></html>
