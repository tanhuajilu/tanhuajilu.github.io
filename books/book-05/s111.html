<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>九四年记录选十三 · 第二段</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="g013.html">← 返回本组目录</a> · <a href="index.html">本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>九四年记录选十三 · 第二段</h1><p class="nav-row"><a class="btn" href="s110.html">上一篇</a> <a class="btn" href="s112.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src="https://audio.tanhuajilu.dpdns.org/book-05/s111.mp3"></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度:<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></p></div><article class="article"><p>问:（公元的来历。）</p><p>答:那按照他们的方法计算，公元的算法恐怕要提前四到六年，耶稣降生准确的年份是哪一年，研究历史的人，还不敢确定。所以1994年还不是从耶稣降生的时候算起，还推迟了三，四年，研究历史的人是这样说的。公元几年，那只是一个大概说法。总的就给人家有一种印象，主耶稣是有一个降生的日子。公元就是说到主耶稣的降生。</p></article></main><script>(function(){
  const audio = document.getElementById('daily-audio');
  const toggle = document.getElementById('auto-next-play');
  const nextLink = Array.from(document.querySelectorAll('.hero a.btn')).find(a => a.textContent.includes('下一篇'));
  if (!audio || !toggle) return;
  const KEY = 'book05-auto-next-play';
  const RATE_KEY = 'book05-playback-rate';
  const rateSel = document.getElementById('playback-rate');
  const saved = localStorage.getItem(KEY);
  toggle.checked = saved === null ? true : saved === '1';
  toggle.addEventListener('change', () => localStorage.setItem(KEY, toggle.checked ? '1' : '0'));
  const savedRate = localStorage.getItem(RATE_KEY) || '1';
  if (rateSel) {
    if (Array.from(rateSel.options).some(o => o.value === savedRate)) rateSel.value = savedRate;
    audio.playbackRate = parseFloat(rateSel.value || '1');
    rateSel.addEventListener('change', () => {
      audio.playbackRate = parseFloat(rateSel.value || '1');
      localStorage.setItem(RATE_KEY, rateSel.value || '1');
    });
  }
  const params = new URLSearchParams(location.search);
  if (params.get('autoplay') === '1') audio.play().catch(() => {});
  audio.addEventListener('ended', () => {
    if (!toggle.checked || !nextLink) return;
    const u = new URL(nextLink.href, location.href);
    u.searchParams.set('autoplay', '1');
    location.href = u.toString();
  });
})();</script></body></html>
