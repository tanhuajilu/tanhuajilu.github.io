<h1>1997年2月8日交通二</h1>
<p>问：（略）</p>
<p>答：婚姻这两个字的意义就是联合。联合就有在&quot;性&quot;这方面，过性的生活的这一方面。</p>
<p>&quot;性&quot;的生活是神圣的东西，不过，不在婚姻之外，也不在夫妻之外。如果在婚姻------夫妻关系之外，另外的去过性生活，就是犯罪。</p>
<p>夫妻结婚以后，这&quot;性&quot;的生活是神圣的。因为没有&quot;性&quot;的生活，婚姻就没有意义。因为夫妻双方有性的要求。神给人婚姻，婚姻是神圣的。</p></article></main></body></html>
