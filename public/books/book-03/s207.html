<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>无比的爱-七月二十五日</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="index.html">← 返回本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>七月二十五日</h1><p class="meta">无比的爱 · 第207/366段</p><p><a class="btn" href="s206.html">上一篇</a><a class="btn" href="s208.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src='https://audio.tanhuajilu.dpdns.org/book-03/s207.mp3'></audio><p class='meta audio-controls-inline'><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度:<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></div><article class="article"><h2>七月二十五日</h2>
<p>我们爱主不是一时的，是一直爱的，祂爱你，你爱祂，你和祂打成一片。既然在这种关系里，就不用说:&quot;这个爱到底是什么？&quot;爱就是爱，讲不出来，这个爱是很奇妙的。你爱一个人，自然对他有一个&quot;情形&quot;，不是单一个道理，是有一个情形，有一个爱的感觉。我们爱主是&quot;一直&quot;的爱主，这个&quot;一直&quot;爱主，就是用信心跟主更亲，这个爱主慢慢就显明出来。</p>
<p>以利沙跟着以利亚，经过了好几个地方，经过吉甲，经过耶利哥，经过伯特利，经过约旦河。（[王下2]（
</article></main><script>(function(){
  const audio = document.getElementById('daily-audio');
  const toggle = document.getElementById('auto-next-play');
  const nextLink = Array.from(document.querySelectorAll('.hero a.btn')).find(a => a.textContent.includes('下一篇'));
  if (!audio || !toggle) return;

  const KEY = 'book01-auto-next-play';
  const RATE_KEY = 'book01-playback-rate';
  const rateSel = document.getElementById('playback-rate');

  const saved = localStorage.getItem(KEY);
  toggle.checked = saved === null ? true : saved === '1';
  toggle.addEventListener('change', () => localStorage.setItem(KEY, toggle.checked ? '1' : '0'));

  const savedRate = localStorage.getItem(RATE_KEY) || '1';
  if (rateSel) {
    if (Array.from(rateSel.options).some(o => o.value === savedRate)) rateSel.value = savedRate;
    audio.playbackRate = parseFloat(rateSel.value || '1');
    rateSel.addEventListener('change', () => {
      audio.playbackRate = parseFloat(rateSel.value || '1');
      localStorage.setItem(RATE_KEY, rateSel.value || '1');
    });
  }

  const params = new URLSearchParams(location.search);
  if (params.get('autoplay') === '1') {
    audio.play().catch(() => {});
  }

  audio.addEventListener('ended', () => {
    if (!toggle.checked || !nextLink) return;
    const u = new URL(nextLink.href, location.href);
    u.searchParams.set('autoplay', '1');
    location.href = u.toString();
  });
})();</script></body></html>
