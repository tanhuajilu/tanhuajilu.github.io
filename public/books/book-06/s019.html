<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>92年选二 · 第十九段</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="g001.html">← 返回本组目录</a> · <a href="index.html">本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>92年选二 · 第十九段</h1><p class="nav-row"><a class="btn" href="s018.html">上一篇</a> <a class="btn" href="s020.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src="https://audio.tanhuajilu.dpdns.org/book-06/s019.mp3"></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度:<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></div><article class="article"><p>问:我念圣经念不明白，不理解。</p><p>答:理解不来，就放在那边，我们不能一下子知道那么多的。像那些念书的，一门一门的去念，都没有一下子全部给你念完。没有这样子。圣经这么大本，我们念了圣经几十年，现在，还有很多不懂的。不懂就不懂。如果我们懂了，神就不伟大，但神是伟大的。</p></article></main><script>(function(){const audio=document.getElementById('daily-audio');const toggle=document.getElementById('auto-next-play');const nextLink=Array.from(document.querySelectorAll('a')).find(a=>a.textContent.includes('下一篇'));if(!audio||!toggle)return;const KEY='book06-auto-next-play';const RATE_KEY='book06-playback-rate';const rateSel=document.getElementById('playback-rate');const saved=localStorage.getItem(KEY);toggle.checked=(saved===null?true:saved==='1');toggle.addEventListener('change',()=>localStorage.setItem(KEY,toggle.checked?'1':'0'));const savedRate=localStorage.getItem(RATE_KEY)||'1';if(rateSel){if(Array.from(rateSel.options).some(o=>o.value===savedRate))rateSel.value=savedRate;audio.playbackRate=parseFloat(rateSel.value||'1');rateSel.addEventListener('change',()=>{audio.playbackRate=parseFloat(rateSel.value||'1');localStorage.setItem(RATE_KEY,rateSel.value||'1');});}const params=new URLSearchParams(location.search);if(params.get('autoplay')==='1')audio.play().catch(()=>{});audio.addEventListener('ended',()=>{if(!toggle.checked||!nextLink)return;const u=new URL(nextLink.href,location.href);u.searchParams.set('autoplay','1');location.href=u.toString();});})();</script></body></html>
