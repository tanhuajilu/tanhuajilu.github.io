<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>92年选二 · 第十段</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="g001.html">← 返回本组目录</a> · <a href="index.html">本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>92年选二 · 第十段</h1><p class="nav-row"><a class="btn" href="s009.html">上一篇</a> <a class="btn" href="s011.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src="/audio/book-06/s010.mp3"></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度:<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></div><article class="article"><p>答:交通就是把里面塞住的东西除去。哪一点塞住，交通了就通。神给我们的交通就是里面那接触点通了。像圣所的灯台，灯台的灯快没有光了，需要剪子把灯火的灰剪掉，灯火再亮起来。交通就为挑旺里面的，一挑旺就有光。要说怎么作，教导一来，反而没有路。因为大家都追求进步，有些人不喜欢人教导，你愈教导，他愈反感。由他去作，由他失败，他转过来就碰到实际。主要的是我们能让神作工。</p></article></main><script>(function(){const audio=document.getElementById('daily-audio');const toggle=document.getElementById('auto-next-play');const nextLink=Array.from(document.querySelectorAll('a')).find(a=>a.textContent.includes('下一篇'));if(!audio||!toggle)return;const KEY='book06-auto-next-play';const RATE_KEY='book06-playback-rate';const rateSel=document.getElementById('playback-rate');const saved=localStorage.getItem(KEY);toggle.checked=(saved===null?true:saved==='1');toggle.addEventListener('change',()=>localStorage.setItem(KEY,toggle.checked?'1':'0'));const savedRate=localStorage.getItem(RATE_KEY)||'1';if(rateSel){if(Array.from(rateSel.options).some(o=>o.value===savedRate))rateSel.value=savedRate;audio.playbackRate=parseFloat(rateSel.value||'1');rateSel.addEventListener('change',()=>{audio.playbackRate=parseFloat(rateSel.value||'1');localStorage.setItem(RATE_KEY,rateSel.value||'1');});}const params=new URLSearchParams(location.search);if(params.get('autoplay')==='1')audio.play().catch(()=>{});audio.addEventListener('ended',()=>{if(!toggle.checked||!nextLink)return;const u=new URL(nextLink.href,location.href);u.searchParams.set('autoplay','1');location.href=u.toString();});})();</script></body></html>
