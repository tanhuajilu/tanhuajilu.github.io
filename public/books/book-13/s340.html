<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>基督長成的身量-十二月五日</title><link rel='stylesheet' href='../../style.css'></head><body><main class='site'><a href='index.html'>← 返回本书目录</a> · <a href='../../index.html'>书库首页</a><div class='hero'><h1>十二月五日</h1><p class='meta'>基督長成的身量 · 第340/366段</p><p><a class='btn' href='s339.html'>上一篇</a><a class='btn' href='s341.html'>下一篇</a></p><div class='audio-panel'><audio id='daily-audio' controls preload='none' src='https://audio.tanhuajilu.dpdns.org/book-13/s340.mp3'></audio><p class='meta audio-controls-inline'><label><input type='checkbox' id='auto-next-play'> 自动翻页并播放&nbsp;&nbsp;</label><span class='speed-control'>播放速度:<select id='playback-rate'><option value='0.8'>0.8x</option><option value='0.9'>0.9x</option><option value='1' selected>1.0x</option><option value='1.1'>1.1x</option><option value='1.25'>1.25x</option><option value='1.5'>1.5x</option></select></span></p></div></div><article class='article'><p>《属灵人》记，对神的工作，因人有肉体的祷告，有肉体的事奉，这是人这边做的，跟神那边连不起来。一个人凭着人自己去敬拜神，跟神就连不起来。因为今天，神因人的信住在人里面，人用灵事奉，才跟神连起来。</p><p>神的生命是非受造的生命。神非受造的生命是天上的，人受造的生命是属地的。好像人跟狗，人尊敬人还有意义，狗是太低了。狗来尊敬我们，那我们的感觉是跟狗一样了。神不接受人的敬拜。</p><p>人必须是在基督里、同着基督来敬拜神。因为人因信所得这基督的生命，是超越的生命，神也是超越的，才配得起来。</p></article></main><script>(function(){const audio=document.getElementById('daily-audio');const toggle=document.getElementById('auto-next-play');const nextLink=Array.from(document.querySelectorAll('.hero a.btn')).find(a=>a.textContent.includes('下一篇'));if(!audio||!toggle)return;const KEY='book01-auto-next-play';const RATE_KEY='book01-playback-rate';const rateSel=document.getElementById('playback-rate');const saved=localStorage.getItem(KEY);toggle.checked=saved===null?true:saved==='1';toggle.addEventListener('change',()=>localStorage.setItem(KEY,toggle.checked?'1':'0'));const savedRate=localStorage.getItem(RATE_KEY)||'1';if(rateSel){if(Array.from(rateSel.options).some(o=>o.value===savedRate))rateSel.value=savedRate;audio.playbackRate=parseFloat(rateSel.value||'1');rateSel.addEventListener('change',()=>{audio.playbackRate=parseFloat(rateSel.value||'1');localStorage.setItem(RATE_KEY,rateSel.value||'1')});}const params=new URLSearchParams(location.search);if(params.get('autoplay')==='1'){audio.play().catch(()=>{});}audio.addEventListener('ended',()=>{if(!toggle.checked||!nextLink)return;const u=new URL(nextLink.href,location.href);u.searchParams.set('autoplay','1');location.href=u.toString();});})();</script></body></html>
