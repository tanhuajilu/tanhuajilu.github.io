<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>基督長成的身量-一月十九日</title><link rel='stylesheet' href='../../style.css'></head><body><main class='site'><a href='index.html'>← 返回本书目录</a> · <a href='../../index.html'>书库首页</a><div class='hero'><h1>一月十九日</h1><p class='meta'>基督長成的身量 · 第19/366段</p><p><a class='btn' href='s018.html'>上一篇</a><a class='btn' href='s020.html'>下一篇</a></p><div class='audio-panel'><audio id='daily-audio' controls preload='none' src='https://audio.tanhuajilu.dpdns.org/book-13/s019.mp3'></audio><p class='meta audio-controls-inline'><label><input type='checkbox' id='auto-next-play'> 自动翻页并播放&nbsp;&nbsp;</label><span class='speed-control'>播放速度:<select id='playback-rate'><option value='0.8'>0.8x</option><option value='0.9'>0.9x</option><option value='1' selected>1.0x</option><option value='1.1'>1.1x</option><option value='1.25'>1.25x</option><option value='1.5'>1.5x</option></select></span></p></div></div><article class='article'><p>在生命里交通，叫人不会感到有搞派别，或分门别类。因为在生命里，去搞小宗派，搞小团体是没有办法存在的，在属灵的范围里，这些不能站得住！</p><p>今天基督教混乱得这么厉害，就是缺少生命，缺少供应，在那里，都是人在讲人的话，讲人的看法；无形中，就产生很多不一样的东西，产生争论，也产生不同的看法。</p><p>你有感觉，都会感觉到其中的分门别类。你没有办法看到那里有爱；没有办法看见是爱、是生命、是身体的东西。</p></article></main><script>(function(){const audio=document.getElementById('daily-audio');const toggle=document.getElementById('auto-next-play');const nextLink=Array.from(document.querySelectorAll('.hero a.btn')).find(a=>a.textContent.includes('下一篇'));if(!audio||!toggle)return;const KEY='book01-auto-next-play';const RATE_KEY='book01-playback-rate';const rateSel=document.getElementById('playback-rate');const saved=localStorage.getItem(KEY);toggle.checked=saved===null?true:saved==='1';toggle.addEventListener('change',()=>localStorage.setItem(KEY,toggle.checked?'1':'0'));const savedRate=localStorage.getItem(RATE_KEY)||'1';if(rateSel){if(Array.from(rateSel.options).some(o=>o.value===savedRate))rateSel.value=savedRate;audio.playbackRate=parseFloat(rateSel.value||'1');rateSel.addEventListener('change',()=>{audio.playbackRate=parseFloat(rateSel.value||'1');localStorage.setItem(RATE_KEY,rateSel.value||'1')});}const params=new URLSearchParams(location.search);if(params.get('autoplay')==='1'){audio.play().catch(()=>{});}audio.addEventListener('ended',()=>{if(!toggle.checked||!nextLink)return;const u=new URL(nextLink.href,location.href);u.searchParams.set('autoplay','1');location.href=u.toString();});})();</script></body></html>
