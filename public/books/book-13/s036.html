<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>基督長成的身量-二月五日</title><link rel='stylesheet' href='../../style.css'></head><body><main class='site'><a href='index.html'>← 返回本书目录</a> · <a href='../../index.html'>书库首页</a><div class='hero'><h1>二月五日</h1><p class='meta'>基督長成的身量 · 第36/366段</p><p><a class='btn' href='s035.html'>上一篇</a><a class='btn' href='s037.html'>下一篇</a></p><div class='audio-panel'><audio id='daily-audio' controls preload='none' src='https://audio.tanhuajilu.dpdns.org/book-13/s036.mp3'></audio><p class='meta audio-controls-inline'><label><input type='checkbox' id='auto-next-play'> 自动翻页并播放&nbsp;&nbsp;</label><span class='speed-control'>播放速度:<select id='playback-rate'><option value='0.8'>0.8x</option><option value='0.9'>0.9x</option><option value='1' selected>1.0x</option><option value='1.1'>1.1x</option><option value='1.25'>1.25x</option><option value='1.5'>1.5x</option></select></span></p></div></div><article class='article'><p>摸到基督的生命就会影响人，这话是实在的。你摸到生命的东西，有生命的内容，也会传递给别人。那天弟兄打电话来，说，交通记录的信息寄到他们那里，分给一些事奉主的弟兄看，已经震动好多人的心；这样下去，生命的路就在那里出去了。</p><p>一位作牧师的弟兄一看交通记录也感动，也翻印出去。这说明出于生命的东西是每一个人都需要的。就是他对过去领受的模糊了，因着有这些信息的交通，就觉醒，会重新摸着。</p><p>这些信息，在你所在的地方，给有接触的人、有交通的人看过，无形中也被带到属灵的路上来。</p></article></main><script>(function(){const audio=document.getElementById('daily-audio');const toggle=document.getElementById('auto-next-play');const nextLink=Array.from(document.querySelectorAll('.hero a.btn')).find(a=>a.textContent.includes('下一篇'));if(!audio||!toggle)return;const KEY='book01-auto-next-play';const RATE_KEY='book01-playback-rate';const rateSel=document.getElementById('playback-rate');const saved=localStorage.getItem(KEY);toggle.checked=saved===null?true:saved==='1';toggle.addEventListener('change',()=>localStorage.setItem(KEY,toggle.checked?'1':'0'));const savedRate=localStorage.getItem(RATE_KEY)||'1';if(rateSel){if(Array.from(rateSel.options).some(o=>o.value===savedRate))rateSel.value=savedRate;audio.playbackRate=parseFloat(rateSel.value||'1');rateSel.addEventListener('change',()=>{audio.playbackRate=parseFloat(rateSel.value||'1');localStorage.setItem(RATE_KEY,rateSel.value||'1')});}const params=new URLSearchParams(location.search);if(params.get('autoplay')==='1'){audio.play().catch(()=>{});}audio.addEventListener('ended',()=>{if(!toggle.checked||!nextLink)return;const u=new URL(nextLink.href,location.href);u.searchParams.set('autoplay','1');location.href=u.toString();});})();</script></body></html>
