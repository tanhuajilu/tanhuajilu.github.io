<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>基督長成的身量-一月六日</title><link rel='stylesheet' href='../../style.css'></head><body><main class='site'><a href='index.html'>← 返回本书目录</a> · <a href='../../index.html'>书库首页</a><div class='hero'><h1>一月六日</h1><p class='meta'>基督長成的身量 · 第6/366段</p><p><a class='btn' href='s005.html'>上一篇</a><a class='btn' href='s007.html'>下一篇</a></p><div class='audio-panel'><audio id='daily-audio' controls preload='none' src='https://audio.tanhuajilu.dpdns.org/book-13/s006.mp3'></audio><p class='meta audio-controls-inline'><label><input type='checkbox' id='auto-next-play'> 自动翻页并播放&nbsp;&nbsp;</label><span class='speed-control'>播放速度:<select id='playback-rate'><option value='0.8'>0.8x</option><option value='0.9'>0.9x</option><option value='1' selected>1.0x</option><option value='1.1'>1.1x</option><option value='1.25'>1.25x</option><option value='1.5'>1.5x</option></select></span></p></div></div><article class='article'><p>目前你有困难，是暂时的，不要怕。你要弄清楚:这个困难是暂时性的，等困难解决了，就会轻松。现在事情还没有解决，你里面还要先享受轻松。求主祝福，使你这些问题能够解决，叫你能够轻松。</p><p>实在，神已经怜悯了你，丈夫跟你同心，小孩也同心，就这一点，已经够你向神献上感谢和赞美了！</p><p>虽然经过些难处，却对你和小孩都有造就，因你更有能力应付难处，小孩也更懂事，问题就解决了！经过这些艰难，是个大教育、大课程，你学习了，弟兄姐妹也和你同有学习。</p><p>现在个别弟兄对你有各种议论，你要学习越过这些。</p></article></main><script>(function(){const audio=document.getElementById('daily-audio');const toggle=document.getElementById('auto-next-play');const nextLink=Array.from(document.querySelectorAll('.hero a.btn')).find(a=>a.textContent.includes('下一篇'));if(!audio||!toggle)return;const KEY='book01-auto-next-play';const RATE_KEY='book01-playback-rate';const rateSel=document.getElementById('playback-rate');const saved=localStorage.getItem(KEY);toggle.checked=saved===null?true:saved==='1';toggle.addEventListener('change',()=>localStorage.setItem(KEY,toggle.checked?'1':'0'));const savedRate=localStorage.getItem(RATE_KEY)||'1';if(rateSel){if(Array.from(rateSel.options).some(o=>o.value===savedRate))rateSel.value=savedRate;audio.playbackRate=parseFloat(rateSel.value||'1');rateSel.addEventListener('change',()=>{audio.playbackRate=parseFloat(rateSel.value||'1');localStorage.setItem(RATE_KEY,rateSel.value||'1')});}const params=new URLSearchParams(location.search);if(params.get('autoplay')==='1'){audio.play().catch(()=>{});}audio.addEventListener('ended',()=>{if(!toggle.checked||!nextLink)return;const u=new URL(nextLink.href,location.href);u.searchParams.set('autoplay','1');location.href=u.toString();});})();</script></body></html>
