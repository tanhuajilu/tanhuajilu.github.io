<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>晒熟的美果-十一月十五日</title><link rel="stylesheet" href="../../style.css"></head><body><main class="site"><a href="index.html">← 返回本书目录</a> · <a href="../../index.html">书库首页</a><div class="hero"><h1>十一月十五日</h1><p class="meta">晒熟的美果 · 第320/366段</p><p><a class="btn" href="s319.html">上一篇</a><a class="btn" href="s321.html">下一篇</a></p><div class="audio-panel"><audio id="daily-audio" controls preload="none" src='https://audio.tanhuajilu.dpdns.org/book-04/s320.mp3'></audio><p class="meta audio-controls-inline"><label><input type="checkbox" id="auto-next-play"> 自动翻页并播放&nbsp;&nbsp;</label><span class="speed-control">播放速度：<select id="playback-rate"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></span></p></div></div><article class="article"><h2>十一月十五日</h2>
<p>在神面前，我们不能糊糊涂涂，不清楚的，要做个明朗的人才对。</p>
<p>今天，我们面对好多问题，是怎样应对，怎样处理的，有一天都要带到神面前来，就是说，要接受神的审判了。</p>
<p>一般想，审判就是要把你不对的指出来，给你一个判断，判断以后，处罚你，给你判刑。</p>
<p>但实在说，审判乃是像旧约时代所说的&quot;正法&quot;。在旧时代时，人若犯该死的罪判死刑，就说给他&quot;正法&quot;。意思是，犯人所作的太错，在法律上，把法弄歪弄倒了，审判判刑的目的，就要在犯人身上，把&quot;法&quot;扶正过来。</p>
</article></main><script>(function(){
  const audio = document.getElementById('daily-audio');
  const toggle = document.getElementById('auto-next-play');
  const nextLink = Array.from(document.querySelectorAll('.hero a.btn')).find(a => a.textContent.includes('下一篇'));
  if (!audio || !toggle) return;

  const KEY = 'book01-auto-next-play';
  const RATE_KEY = 'book01-playback-rate';
  const rateSel = document.getElementById('playback-rate');

  const saved = localStorage.getItem(KEY);
  toggle.checked = saved === null ? true : saved === '1';
  toggle.addEventListener('change', () => localStorage.setItem(KEY, toggle.checked ? '1' : '0'));

  const savedRate = localStorage.getItem(RATE_KEY) || '1';
  if (rateSel) {
    if (Array.from(rateSel.options).some(o => o.value === savedRate)) rateSel.value = savedRate;
    audio.playbackRate = parseFloat(rateSel.value || '1');
    rateSel.addEventListener('change', () => {
      audio.playbackRate = parseFloat(rateSel.value || '1');
      localStorage.setItem(RATE_KEY, rateSel.value || '1');
    });
  }

  const params = new URLSearchParams(location.search);
  if (params.get('autoplay') === '1') {
    audio.play().catch(() => {});
  }

  audio.addEventListener('ended', () => {
    if (!toggle.checked || !nextLink) return;
    const u = new URL(nextLink.href, location.href);
    u.searchParams.set('autoplay', '1');
    location.href = u.toString();
  });
})();</script></body></html>
